<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Manas Dani - Forward Deployed AI Engineer</title>
  <desc id="desc">Animated AI systems map showing a request flowing through agent, retrieval, evaluation, and production stages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.48" stop-color="#0B1026"/>
      <stop offset="1" stop-color="#061B24"/>
      <animate attributeName="x1" values="0;80;0" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1200;1080;1200" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00D4FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 H 0 V 38" stroke="#223047" stroke-width="1" opacity="0.45"/>
    </pattern>
    <style>
      .label { font: 700 18px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #E6F7FF; }
      .small { font: 600 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #89A8B8; }
      .title { font: 800 56px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; letter-spacing: 0; }
      .role { font: 800 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #00D4FF; letter-spacing: 0; }
      .tagline { font: 600 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #BBD7E5; letter-spacing: 0; }
      .node { fill: #0D172A; stroke: #2AE8FF; stroke-width: 1.5; }
      .wire { stroke: #2AE8FF; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 10 18; opacity: 0.75; }
    </style>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="24" fill="url(#grid)" opacity="0.55">
    <animateTransform attributeName="transform" type="translate" values="0 0;38 38;0 0" dur="18s" repeatCount="indefinite"/>
  </rect>
  <circle cx="930" cy="100" r="180" fill="url(#glow)" opacity="0.6">
    <animate attributeName="cx" values="900;980;900" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="275" r="130" fill="url(#glow)" opacity="0.28">
    <animate attributeName="cy" values="275;230;275" dur="9s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.9">
    <path class="wire" d="M135 250 C255 180, 330 290, 450 218 S655 150, 760 220 S940 292, 1070 206">
      <animate attributeName="stroke-dashoffset" values="0;-56" dur="3.8s" repeatCount="indefinite"/>
    </path>
    <path class="wire" d="M140 115 C280 130, 330 70, 455 118 S650 210, 790 118 S965 65, 1085 118" opacity="0.42">
      <animate attributeName="stroke-dashoffset" values="0;-56" dur="5.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="146" cy="250" r="7" fill="#9BFAFF"/>
    <circle cx="450" cy="218" r="7" fill="#9BFAFF"/>
    <circle cx="760" cy="220" r="7" fill="#9BFAFF"/>
    <circle cx="1070" cy="206" r="7" fill="#9BFAFF"/>
    <circle cx="455" cy="118" r="5" fill="#7C8CFF"/>
    <circle cx="790" cy="118" r="5" fill="#7C8CFF"/>
  </g>

  <g transform="translate(94 54)">
    <text class="title" x="0" y="58">Manas Dani</text>
    <text class="role" x="0" y="101">Forward Deployed AI Engineer</text>
    <text class="tagline" x="0" y="136">Building agentic AI systems that retrieve, reason, evaluate, and ship.</text>
  </g>

  <g transform="translate(92 202)">
    <rect class="node" x="0" y="0" width="142" height="58" rx="14"/>
    <text class="label" x="22" y="26">Problem</text>
    <text class="small" x="22" y="45">messy reality</text>
  </g>
  <g transform="translate(302 172)">
    <rect class="node" x="0" y="0" width="142" height="58" rx="14"/>
    <text class="label" x="22" y="26">Agent</text>
    <text class="small" x="22" y="45">tools + state</text>
  </g>
  <g transform="translate(512 202)">
    <rect class="node" x="0" y="0" width="142" height="58" rx="14"/>
    <text class="label" x="22" y="26">Retrieval</text>
    <text class="small" x="22" y="45">grounded context</text>
  </g>
  <g transform="translate(722 172)">
    <rect class="node" x="0" y="0" width="142" height="58" rx="14"/>
    <text class="label" x="22" y="26">Eval</text>
    <text class="small" x="22" y="45">traces + tests</text>
  </g>
  <g transform="translate(932 202)">
    <rect class="node" x="0" y="0" width="156" height="58" rx="14"/>
    <text class="label" x="22" y="26">Production</text>
    <text class="small" x="22" y="45">shipped system</text>
  </g>

  <g opacity="0.78">
    <text class="small" x="94" y="326">LangGraph</text>
    <text class="small" x="204" y="326">RAG</text>
    <text class="small" x="265" y="326">LLM evaluation</text>
    <text class="small" x="420" y="326">FastAPI</text>
    <text class="small" x="515" y="326">AWS</text>
    <text class="small" x="575" y="326">Docker</text>
    <text class="small" x="665" y="326">Monitoring</text>
  </g>
</svg>
